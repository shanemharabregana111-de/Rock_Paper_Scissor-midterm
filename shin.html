<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div id="gameCard">
        <h2 id="gameTitle">Rock Paper Scissors</h2>

        <div id="scoreContainer">
            <div id="userScoreSection">
                <h5>You</h5>
                <p id="userScore">0</p>
            </div>
            <div id="computerScoreSection">
                <h5>Computer</h5>
                <p id="computerScore">0</p>
            </div>
        </div>

        <div id="resultBanner">
            You win!
        </div>

        <div id="choiceButtonsContainer">
              <button id="btnRock">Rock</button>
              <button id="btnPaper">Paper</button>
              <button id="btnScissors">Scissors</button>
        </div>

        <p id="lastPlayInfo">
            You chose: <span id="userChoiceText">PAPER</span> | 
            Computer chose: <span id="computerChoiceText">ROCK</span>
        </p>

        <div>
            <button id="btnReset">Reset Game</button>
        </div>
    </div>

    <script src="shin.js"></script>
</body>
</html>
